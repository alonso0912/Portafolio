[build]
  base = "frontend"
  publish = "dist"
  functions = "frontend/netlify/functions"
  command = "npm run build"

[build.environment]
  VITE_API_URL = "/"
  # Configura estas variables en Netlify con tus valores reales:
  # MONGO_URI = "mongodb+srv://usuario:clave@cluster.mongodb.net/portafolio"
  # ADMIN_EMAIL = "admin@portafolio.com"
  # ADMIN_PASSWORD = "Admin1234"
  # JWT_SECRET = "mi_clave_secreta_123"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Caché y compresión de archivos estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Encoding = "gzip"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Encoding = "gzip"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Encoding = "gzip"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Content-Encoding = "gzip"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache"
